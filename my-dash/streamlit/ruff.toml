# Linter/formatter Python do app Streamlit. Alinhado à config do backend.
line-length = 100
target-version = "py310"

[lint]
# E/W: pycodestyle · F: pyflakes · I: isort · B: bugbear
select = ["E", "W", "F", "I", "B"]
ignore = [
    "E501", # linhas longas: textos de markdown/st.* propositalmente longos
]
