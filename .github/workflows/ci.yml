name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Lint, testes e build (my-dash)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-dash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Rodar testes
        run: bun test

      - name: Build de produção
        run: bun run build

  lint-python:
    name: Lint Python (Streamlit / Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-dash/streamlit
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Ruff
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format --check
        run: ruff format --check .
