name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint, testes e build (my-dash)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-dash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Rodar testes
        run: bun test

      - name: Build de produção
        run: bun run build
